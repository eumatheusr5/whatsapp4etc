services:
  - type: web
    name: whatsapp4etc-api
    runtime: docker
    plan: starter
    region: sao
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: LOG_LEVEL
        value: info
      - key: SUPABASE_URL
        value: https://ioadobjuizywerkglqjy.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: whatsapp4etc-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: SENTRY_DSN_BACKEND
        sync: false

  - type: keyvalue
    name: whatsapp4etc-redis
    plan: free
    region: sao
    ipAllowList: []
    maxmemoryPolicy: noeviction
